<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITDA E-Monitoring Application</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root { --primary: #4f46e5; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }
        .glass-sidebar { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        .btn-action { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-action:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="text-slate-900 overflow-hidden">

    <div id="loading-screen" class="fixed inset-0 bg-slate-900 z-[100] flex flex-col items-center justify-center text-white transition-opacity duration-500">
        <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-xs font-bold tracking-[0.3em] uppercase opacity-50">Menghubungkan ke Sistem...</p>
    </div>

    <div id="login-container" class="hidden fixed inset-0 bg-slate-950 z-[90] flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-[2.5rem] p-10 shadow-2xl">
            <div class="flex flex-col items-center mb-10">
                <div class="bg-indigo-600 p-4 rounded-2xl mb-4 shadow-xl shadow-indigo-500/20">
                    <i data-lucide="shield-check" class="text-white w-10 h-10"></i>
                </div>
                <h1 class="text-2xl font-extrabold text-white tracking-tight">E-MONITORING</h1>
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mt-1">Inspektorat Cloud System</p>
            </div>
            
            <form id="login-form" class="space-y-4">
                <div id="login-error" class="hidden bg-rose-500/10 border border-rose-500/20 text-rose-500 p-3 rounded-xl text-xs font-bold text-center"></div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Username</label>
                    <input type="text" id="username" required class="w-full p-4 bg-slate-800 border border-slate-700 rounded-xl text-white outline-none focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="admin / ekbang">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Password</label>
                    <input type="password" id="password" required class="w-full p-4 bg-slate-800 border border-slate-700 rounded-xl text-white outline-none focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl mt-4 transition-all uppercase text-xs tracking-widest flex items-center justify-center gap-2">
                    <i data-lucide="log-in" class="w-4 h-4"></i> Masuk Sekarang
                </button>
            </form>
        </div>
    </div>

    <div id="app-container" class="hidden h-screen flex overflow-hidden">
        <aside class="w-72 glass-sidebar flex-shrink-0 flex flex-col border-r border-slate-800">
            <div class="p-8 flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-xl text-white"><i data-lucide="bar-chart-3" class="w-6 h-6"></i></div>
                <div>
                    <h2 class="text-white font-black text-lg leading-none tracking-tighter">ITDA MONEV</h2>
                    <span class="text-indigo-400 text-[8px] font-bold uppercase tracking-widest">Cloud V2.1</span>
                </div>
            </div>
            <nav class="flex-1 px-6 space-y-1 overflow-y-auto custom-scrollbar">
                <p class="text-[9px] font-black text-slate-600 uppercase tracking-[0.2em] mb-4 px-2">Bidang Pengawasan</p>
                <div id="sidebar-menu-list" class="space-y-1"></div>
            </nav>
            <div class="p-6 border-t border-slate-800">
                <div class="flex items-center gap-3 p-3 bg-slate-800/40 rounded-2xl mb-4 border border-slate-700/50">
                    <div id="user-avatar" class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center text-white font-bold">U</div>
                    <div class="overflow-hidden">
                        <p id="user-display-name" class="text-white text-[11px] font-black uppercase truncate">Username</p>
                        <p id="user-display-role" class="text-indigo-400 text-[9px] font-bold uppercase truncate">Role</p>
                    </div>
                </div>
                <button id="logout-btn" class="w-full flex items-center justify-center gap-2 px-4 py-3 text-rose-400 font-bold text-[10px] hover:bg-rose-500/10 rounded-xl transition-all uppercase tracking-widest">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Logout
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0">
            <header class="h-20 bg-white border-b border-slate-200 px-8 flex items-center justify-between flex-shrink-0">
                <div class="flex items-center gap-4">
                    <div class="flex flex-col">
                        <span id="current-view-title" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Dashboard</span>
                        <h1 id="active-bidang-name" class="text-xl font-extrabold text-slate-800 tracking-tight">BIDANG ...</h1>
                    </div>
                </div>
                <div class="flex bg-slate-100 p-1 rounded-2xl">
                    <button onclick="switchTab('dashboard')" class="tab-btn px-6 py-2.5 rounded-xl text-[10px] font-bold uppercase transition-all" data-tab="dashboard">Dashboard</button>
                    <button onclick="switchTab('realisasi')" class="tab-btn px-6 py-2.5 rounded-xl text-[10px] font-bold uppercase transition-all" data-tab="realisasi">Data Realisasi</button>
                    <button id="add-btn-nav" onclick="switchTab('input')" class="tab-btn hidden px-6 py-2.5 rounded-xl text-[10px] font-bold uppercase transition-all" data-tab="input">Input ST</button>
                </div>
            </header>

            <div id="main-scroll-content" class="flex-1 overflow-y-auto p-8 custom-scrollbar">
                <div id="tab-dashboard" class="tab-content hidden animate-fade space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Total ST</p>
                            <h3 id="stat-total" class="text-2xl font-extrabold">0</h3>
                        </div>
                        <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">LHP Terbit</p>
                            <h3 id="stat-selesai" class="text-2xl font-extrabold text-emerald-600">0</h3>
                        </div>
                        <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Proses</p>
                            <h3 id="stat-proses" class="text-2xl font-extrabold text-indigo-600">0</h3>
                        </div>
                        <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Terlambat</p>
                            <h3 id="stat-overdue" class="text-2xl font-extrabold text-rose-600">0</h3>
                        </div>
                    </div>
                    <div class="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm p-8">
                        <h4 class="text-sm font-black text-slate-800 uppercase mb-6 flex items-center gap-2">
                            <i data-lucide="activity" class="w-5 h-5 text-indigo-500"></i> Aktivitas Terbaru
                        </h4>
                        <div id="recent-list" class="space-y-3"></div>
                    </div>
                </div>

                <div id="tab-realisasi" class="tab-content hidden animate-fade space-y-6">
                    <div class="flex flex-col md:flex-row gap-4 items-center bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                        <div class="relative flex-1 w-full">
                            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                            <input type="text" id="search-input" placeholder="Cari nomor surat atau objek..." class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <select id="filter-status" class="bg-slate-50 border border-slate-200 px-4 py-3 rounded-xl text-xs font-bold uppercase outline-none">
                            <option value="Semua">Semua Status</option>
                            <option value="Perencanaan">Perencanaan</option>
                            <option value="Pelaksanaan">Pelaksanaan</option>
                            <option value="Penyusunan Konsep">Penyusunan Konsep</option>
                            <option value="LHP Terbit">LHP Terbit</option>
                        </select>
                    </div>
                    <div id="data-list" class="space-y-4"></div>
                </div>

                <div id="tab-input" class="tab-content hidden animate-fade max-w-2xl mx-auto">
                    <div class="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-xl">
                        <form id="st-form" class="space-y-6">
                            <h2 class="text-2xl font-black text-slate-800 uppercase text-center mb-8 tracking-tight">Registrasi Penugasan</h2>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-1">
                                    <label class="text-[9px] font-bold text-slate-500 uppercase">Nomor ST</label>
                                    <input type="text" name="nomorSurat" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold" placeholder="700/...">
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[9px] font-bold text-slate-500 uppercase">Jenis</label>
                                    <select name="jenisPengawasan" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold">
                                        <option>Audit</option><option>Review</option><option>Evaluasi</option><option>Monitoring</option>
                                    </select>
                                </div>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[9px] font-bold text-slate-500 uppercase">Nama Objek</label>
                                <input type="text" name="namaObjek" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold" placeholder="Nama OPD / Instansi">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[9px] font-bold text-slate-500 uppercase">Uraian</label>
                                <textarea name="uraianPenugasan" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm min-h-[100px]" placeholder="Deskripsi tugas..."></textarea>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-1">
                                    <label class="text-[9px] font-bold text-slate-500 uppercase">Tanggal Mulai</label>
                                    <input type="date" name="tanggalMulai" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold">
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[9px] font-bold text-slate-500 uppercase">Tanggal Selesai</label>
                                    <input type="date" name="tanggalSelesai" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold">
                                </div>
                            </div>
                            <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-5 rounded-[2rem] shadow-xl hover:bg-indigo-700 transition-all uppercase text-xs tracking-widest mt-4">Simpan Data</button>
                        </form>
                    </div>
                </div>
            </div>

            <footer class="h-14 bg-white border-t border-slate-200 px-8 flex items-center justify-between text-[9px] font-bold text-slate-400 uppercase tracking-widest">
                <div>ITDA Cloud © 2024 • Internal System</div>
                <div class="flex items-center gap-2">
                    <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span> Sistem Normal
                </div>
            </footer>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'itda-web-monitoring-v2';

        const MOCK_USERS = {
            'admin': { password: 'admin123', role: 'ADMIN', bidang: 'SEMUA' },
            'ekbang': { password: 'ekbang123', role: 'USER', bidang: 'EKBANG' },
            'kesra': { password: 'kesra123', role: 'USER', bidang: 'KESRA' },
            'adum': { password: 'adum123', role: 'USER', bidang: 'ADUM' }
        };

        const BIDANG_LIST = ['EKBANG', 'KESRA', 'ADUM', 'INVESTIGASI'];
        const STATUS_STAGES = [
            { label: 'Perencanaan', value: 10, color: 'bg-slate-400' },
            { label: 'Pelaksanaan', value: 40, color: 'bg-blue-500' },
            { label: 'Penyusunan Konsep', value: 70, color: 'bg-indigo-500' },
            { label: 'LHP Terbit', value: 100, color: 'bg-emerald-500' }
        ];

        let state = {
            user: null,
            userProfile: null,
            activeBidang: 'EKBANG',
            activeTab: 'dashboard',
            penugasan: [],
            searchTerm: '',
            filterStatus: 'Semua'
        };

        const formatDate = (d) => d ? new Date(d).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }) : '-';

        onAuthStateChanged(auth, (user) => {
            state.user = user;
            const savedSession = localStorage.getItem('itda_session');
            if (user && savedSession) {
                state.userProfile = JSON.parse(savedSession);
                if (state.userProfile.role === 'USER') state.activeBidang = state.userProfile.bidang;
                showApp();
                setupDataListener();
            } else { showLogin(); }
            document.getElementById('loading-screen').classList.add('opacity-0');
            setTimeout(() => document.getElementById('loading-screen').classList.add('hidden'), 500);
        });

        const showApp = () => {
            document.getElementById('login-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            document.getElementById('user-display-name').innerText = state.userProfile.username;
            document.getElementById('user-display-role').innerText = state.userProfile.role;
            document.getElementById('user-avatar').innerText = state.userProfile.username[0].toUpperCase();
            renderSidebar();
            updateUIHeader();
            switchTab(state.activeTab);
        };

        const showLogin = () => {
            document.getElementById('login-container').classList.remove('hidden');
            document.getElementById('app-container').classList.add('hidden');
            lucide.createIcons();
        };

        window.switchTab = (tab) => {
            state.activeTab = tab;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.className = btn.dataset.tab === tab 
                    ? "tab-btn px-6 py-2.5 rounded-xl text-[10px] font-bold uppercase transition-all bg-white shadow text-indigo-600"
                    : "tab-btn px-6 py-2.5 rounded-xl text-[10px] font-bold uppercase transition-all text-slate-500 hover:text-slate-800";
            });
            document.getElementById('main-scroll-content').scrollTo(0,0);
        };

        window.switchBidang = (bidang) => {
            if (state.userProfile.role === 'USER' && state.userProfile.bidang !== bidang) return;
            state.activeBidang = bidang;
            state.searchTerm = '';
            document.getElementById('search-input').value = '';
            updateUIHeader();
            renderSidebar();
            renderStats();
            renderRecentActivity();
            renderDataList();
        };

        const updateUIHeader = () => {
            document.getElementById('active-bidang-name').innerText = `BIDANG ${state.activeBidang}`;
            const canInput = state.userProfile?.role === 'ADMIN' || (state.userProfile?.role === 'USER' && state.userProfile.bidang === state.activeBidang);
            document.getElementById('add-btn-nav').classList.toggle('hidden', !canInput);
            if (!canInput && state.activeTab === 'input') switchTab('dashboard');
        };

        const renderSidebar = () => {
            const list = document.getElementById('sidebar-menu-list');
            list.innerHTML = BIDANG_LIST.map(item => {
                if (state.userProfile?.role === 'USER' && state.userProfile.bidang !== item) return '';
                const isActive = state.activeBidang === item;
                return `
                    <button onclick="switchBidang('${item}')" class="w-full flex items-center justify-between px-4 py-3.5 rounded-2xl text-[11px] font-black transition-all ${isActive ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}">
                        <div class="flex items-center gap-3"><i data-lucide="layers" class="w-4 h-4"></i><span>${item}</span></div>
                        ${isActive ? '<div class="w-1.5 h-1.5 bg-white rounded-full animate-pulse"></div>' : ''}
                    </button>`;
            }).join('');
            lucide.createIcons();
        };

        const setupDataListener = () => {
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'penugasan'));
            onSnapshot(q, (snapshot) => {
                state.penugasan = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))
                    .sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                renderStats();
                renderRecentActivity();
                renderDataList();
            });
        };

        const renderStats = () => {
            const filtered = state.penugasan.filter(p => p.sub === state.activeBidang);
            const now = new Date();
            document.getElementById('stat-total').innerText = filtered.length;
            document.getElementById('stat-selesai').innerText = filtered.filter(p => p.status === 'LHP Terbit').length;
            document.getElementById('stat-proses').innerText = filtered.filter(p => p.status !== 'LHP Terbit').length;
            document.getElementById('stat-overdue').innerText = filtered.filter(p => p.tanggalSelesai && new Date(p.tanggalSelesai) < now && p.status !== 'LHP Terbit').length;
        };

        const renderRecentActivity = () => {
            const recent = state.penugasan.filter(p => p.sub === state.activeBidang).slice(0, 5);
            const container = document.getElementById('recent-list');
            if (!recent.length) return container.innerHTML = '<p class="text-center py-10 text-slate-300 text-[10px] uppercase font-bold">Belum ada data</p>';
            container.innerHTML = recent.map(p => `
                <div class="flex items-center justify-between p-5 bg-slate-50/50 rounded-2xl border border-slate-100">
                    <div class="flex items-center gap-4 truncate">
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-indigo-100 text-indigo-600"><i data-lucide="file-text" class="w-5 h-5"></i></div>
                        <div class="truncate"><h4 class="text-xs font-black text-slate-800 uppercase truncate">${p.namaObjek}</h4><p class="text-[9px] font-mono font-bold text-slate-400">ST: ${p.nomorSurat}</p></div>
                    </div>
                    <div class="text-right"><span class="text-[9px] font-black uppercase text-indigo-600">${p.status}</span><p class="text-[8px] font-bold text-slate-400 uppercase">${p.progres}% Selesai</p></div>
                </div>`).join('');
            lucide.createIcons();
        };

        const renderDataList = () => {
            const container = document.getElementById('data-list');
            const filtered = state.penugasan.filter(p => {
                const matchBidang = p.sub === state.activeBidang;
                const matchSearch = p.namaObjek?.toLowerCase().includes(state.searchTerm.toLowerCase()) || p.nomorSurat?.toLowerCase().includes(state.searchTerm.toLowerCase());
                const matchStatus = state.filterStatus === 'Semua' || p.status === state.filterStatus;
                return matchBidang && matchSearch && matchStatus;
            });
            if (!filtered.length) return container.innerHTML = '<div class="py-20 text-center text-slate-300 uppercase text-xs font-bold">Tidak ada data ditemukan</div>';
            container.innerHTML = filtered.map(p => {
                const stage = STATUS_STAGES.find(s => s.label === p.status) || STATUS_STAGES[0];
                const canEdit = state.userProfile?.role === 'ADMIN' || (state.userProfile?.role === 'USER' && state.userProfile.bidang === p.sub);
                return `
                    <div class="bg-white rounded-[2rem] border border-slate-100 p-6 shadow-sm hover:shadow-md transition-all animate-fade">
                        <div class="flex flex-col lg:flex-row gap-6">
                            <div class="flex-1 space-y-3">
                                <div class="flex items-center gap-3"><span class="bg-indigo-50 text-indigo-600 text-[8px] font-black px-3 py-1 rounded-full uppercase">${p.jenisPengawasan}</span><span class="text-[10px] font-mono font-bold text-slate-400">${p.nomorSurat}</span></div>
                                <h4 class="text-base font-black text-slate-800 uppercase">${p.namaObjek}</h4>
                                <div class="text-[9px] font-bold text-slate-400 uppercase">Periode: ${formatDate(p.tanggalMulai)} - ${formatDate(p.tanggalSelesai)}</div>
                            </div>
                            <div class="w-full lg:w-48 flex flex-col justify-center">
                                <div class="flex justify-between items-end mb-2"><span class="text-[9px] font-black uppercase text-indigo-600">${p.status}</span><span class="text-xs font-black">${p.progres}%</span></div>
                                <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden"><div class="h-full ${stage.color} transition-all duration-500" style="width: ${p.progres}%"></div></div>
                            </div>
                            <div class="flex items-center gap-2">
                                ${canEdit ? `
                                    <button onclick="handleStatusUpdate('${p.id}', '${p.status}')" class="btn-action p-3 bg-indigo-50 text-indigo-600 rounded-xl ${p.status === 'LHP Terbit' ? 'opacity-20 pointer-events-none' : ''}"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                                    <button onclick="handleDelete('${p.id}')" class="btn-action p-3 bg-rose-50 text-rose-500 rounded-xl"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                                ` : '<span class="text-[9px] text-slate-300 font-bold uppercase italic">Read Only</span>'}
                            </div>
                        </div>
                    </div>`;
            }).join('');
            lucide.createIcons();
        };

        window.handleStatusUpdate = async (id, currentStatus) => {
            const idx = STATUS_STAGES.findIndex(s => s.label === currentStatus);
            if (idx === -1 || idx === STATUS_STAGES.length - 1) return;
            const next = STATUS_STAGES[idx + 1];
            try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'penugasan', id), { status: next.label, progres: next.value, updatedAt: serverTimestamp() }); } catch(e) {}
        };

        window.handleDelete = async (id) => {
            if (confirm('Hapus data ini?')) try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'penugasan', id)); } catch(e) {}
        };

        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value.toLowerCase();
            const p = document.getElementById('password').value;
            if (MOCK_USERS[u] && MOCK_USERS[u].password === p) {
                const profile = { username: u, ...MOCK_USERS[u] };
                localStorage.setItem('itda_session', JSON.stringify(profile));
                state.userProfile = profile;
                if (profile.role === 'USER') state.activeBidang = profile.bidang;
                showApp();
                setupDataListener();
            } else {
                const err = document.getElementById('login-error');
                err.innerText = "Kredensial salah";
                err.classList.remove('hidden');
            }
        };

        document.getElementById('st-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerText = "Menyimpan...";
            const fd = new FormData(e.target);
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'penugasan'), {
                    nomorSurat: fd.get('nomorSurat'),
                    namaObjek: fd.get('namaObjek'),
                    jenisPengawasan: fd.get('jenisPengawasan'),
                    uraianPenugasan: fd.get('uraianPenugasan'),
                    tanggalMulai: fd.get('tanggalMulai'),
                    tanggalSelesai: fd.get('tanggalSelesai'),
                    status: 'Perencanaan', progres: 10, sub: state.activeBidang,
                    createdAt: serverTimestamp(), createdBy: state.userProfile.username
                });
                e.target.reset();
                switchTab('realisasi');
            } catch(e) { alert('Gagal simpan'); } finally { btn.disabled = false; btn.innerText = "Simpan Data"; }
        };

        document.getElementById('logout-btn').onclick = async () => { localStorage.removeItem('itda_session'); await signOut(auth); location.reload(); };
        document.getElementById('search-input').oninput = (e) => { state.searchTerm = e.target.value; renderDataList(); };
        document.getElementById('filter-status').onchange = (e) => { state.filterStatus = e.target.value; renderDataList(); };

        (async () => {
            try { await (typeof __initial_auth_token !== 'undefined' && __initial_auth_token ? signInWithCustomToken(auth, __initial_auth_token) : signInAnonymously(auth)); } catch(e) {}
        })();
    </script>
</body>
</html>
